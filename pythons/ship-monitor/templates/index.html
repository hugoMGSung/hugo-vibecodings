<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>선박 실시간 위치 모니터링</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    .panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 999;
      background: white;
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      min-width: 260px;
    }

    .ship-item {
      font-size: 14px;
      margin-bottom: 8px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 6px;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h3>선박 모니터링</h3>
    <div id="shipList"></div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    const map = L.map("map").setView([35.095, 129.04], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "OpenStreetMap"
    }).addTo(map);

    const markers = {};

    const ws = new WebSocket(`ws://${location.host}/ws/ships`);

    ws.onmessage = (event) => {
      const ships = JSON.parse(event.data);
      const shipList = document.getElementById("shipList");
      shipList.innerHTML = "";

      ships.forEach(ship => {
        const latlng = [ship.lat, ship.lng];

        if (!markers[ship.id]) {
          markers[ship.id] = L.marker(latlng).addTo(map);
        } else {
          markers[ship.id].setLatLng(latlng);
        }

        markers[ship.id].bindPopup(`
          <b>${ship.name}</b><br>
          ID: ${ship.id}<br>
          속도: ${ship.speed} kn<br>
          침로: ${ship.course}°
        `);

        shipList.innerHTML += `
          <div class="ship-item">
            <b>${ship.name}</b><br>
            ${ship.id}<br>
            속도: ${ship.speed} kn / 침로: ${ship.course}°
          </div>
        `;
      });
    };
  </script>
</body>
</html>
